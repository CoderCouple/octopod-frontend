AWSTemplateFormatVersion: '2010-09-09'
Description: "Reusable Codebuild Pipeline for Next.js frontend repositories"

Parameters:
  ProjectName:
    Type: String
    Description: Unique project identifier (e.g., web, app, portal)
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: Must contain only lowercase letters, numbers, and hyphens
  Environment:
    Type: String
    Description: Environment name
    Default: dev
    AllowedValues:
      - dev
      - prod
  GitHubOrgName:
    Type: String
    Description: GitHub organization name
  GitHubRepositoryName:
    Type: String
    Description: GitHub repository name
  ECRRepositoryName:
    Type: String
    Description: ECR repository name (optional - if not provided, will use ProjectName-Environment)
    Default: ""
  AWSRegion:
    Type: String
    Default: us-west-2
    Description: AWS region
  GitHubTokenSecretName:
    Type: String
    Default: CONTEXT0-FRONTEND-GITHUB-TOKEN
    Description: The name of the secret in AWS Secrets Manager that contains the GitHub token

Conditions:
  UseDefaultECRName: !Equals [!Ref ECRRepositoryName, ""]

Resources:
  NextJSCodeBuildServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-nextjs-codebuild-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWSRegion}:${AWS::AccountId}:secret:${GitHubTokenSecretName}*
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: '*'

  NextJSCodeBuildProject:
    Type: 'AWS::CodeBuild::Project'
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-build"
      Source:
        Type: GITHUB
        Location: !Sub "https://github.com/${GitHubOrgName}/${GitHubRepositoryName}.git"
        GitCloneDepth: 1
        BuildSpec: 'buildspec.yml'
        ReportBuildStatus: false
        InsecureSsl: false
        GitSubmodulesConfig:
          FetchSubmodules: false
        Auth:
          Type: OAUTH
          Resource: !Sub "{{resolve:secretsmanager:${GitHubTokenSecretName}:SecretString}}"
      Artifacts:
        Type: NO_ARTIFACTS
      Cache:
        Type: NO_CACHE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_ACCOUNT_ID
            Value: !Ref 'AWS::AccountId'
          - Name: AWS_DEFAULT_REGION
            Value: !Ref 'AWS::Region'
          - Name: ECR_REPOSITORY_NAME
            Value: !If [UseDefaultECRName, !Sub "${ProjectName}-${Environment}", !Ref ECRRepositoryName]
          - Name: ECR_REPOSITORY_URI
            Value: !GetAtt NextJSECRRepository.RepositoryUri
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: GITHUB_TOKEN_SECRET_NAME
            Value: !Ref 'GitHubTokenSecretName'
      ServiceRole: !GetAtt NextJSCodeBuildServiceRole.Arn
      SourceVersion: main
      TimeoutInMinutes: 30
      QueuedTimeoutInMinutes: 480
      EncryptionKey: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/s3"
      VpcConfig: { }
      BadgeEnabled: false
      LogsConfig:
        CloudWatchLogs:
          Status: "ENABLED"
        S3Logs:
          Status: "DISABLED"
          EncryptionDisabled: false
      Visibility: "PRIVATE"

  NextJSECRRepository:
    Type: 'AWS::ECR::Repository'
    Properties:
      RepositoryName: !If [UseDefaultECRName, !Sub "${ProjectName}-${Environment}", !Ref ECRRepositoryName]
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 1 day",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 1
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Keep last 20 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

Outputs:
  NextJSCodeBuildProjectName:
    Description: The name of the CodeBuild project
    Value: !Ref NextJSCodeBuildProject
  NextJSECRRepositoryUri:
    Description: The URI of the ECR repository
    Value: !GetAtt NextJSECRRepository.RepositoryUri